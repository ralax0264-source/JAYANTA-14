<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#ff416c,#ff4b2b,#6a11cb,#2575fc);
background-size:800% 800%;
animation:gradientMove 12s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.3);
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

img{
width:200px;
border-radius:20px;
margin-bottom:20px;
transition:0.4s;
}

img:hover{
transform:scale(1.1);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:25px;
}

.social a{
font-size:35px;
margin:15px;
color:white;
transition:0.3s;
}

.social a:hover{
transform:scale(1.3);
color:yellow;
}

.follow{
margin-top:20px;
font-size:18px;
}

</style>

</head>
